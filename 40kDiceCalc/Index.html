<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>40k Hurt System Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="calculator-container">
      <h1>40k Dice Calculator</h1>

      <div class="stats-grid">
        <section class="panel attacker-panel">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 15px;
            "
          >
            <h2>Attacker Roster</h2>
            <button
              id="add-attacker-btn"
              style="
                padding: 8px 15px;
                border-radius: 8px;
                background: var(--accent-blue);
                color: var(--bg-color);
                border: none;
                cursor: pointer;
                font-weight: bold;
              "
            >
              + Add Unit
            </button>
          </div>

          <div id="attacker-roster"></div>
        </section>

        <section class="panel target-panel">
          <h2>Target Profile</h2>

          <h4>Defensive Stats</h4>
          <div class="input-group">
            <div class="input-field">
              <label>Toughness (T)</label
              ><input type="number" id="toughness" value="10" min="1" />
            </div>
            <div class="input-field">
              <label>Wounds (W)</label
              ><input type="number" id="wounds" value="12" min="1" />
            </div>
            <div class="input-field">
              <label>Save (SV)</label
              ><input type="number" id="save" value="4" min="2" max="7" />
            </div>
            <div class="input-field">
              <label>Invulnerable</label
              ><input
                type="number"
                id="inVul"
                min="2"
                max="6"
                placeholder="None"
              />
            </div>
          </div>

          <h4>Defensive Abilities</h4>
          <div class="input-field">
            <label>Feel No Pain (FNP)</label>
            <select id="def-fnp">
              <option value="0">None</option>
              <option value="6">6+</option>
              <option value="5">5+</option>
              <option value="4">4+</option>
            </select>
          </div>
          <div class="input-field" style="margin-top: 15px">
            <label>Models in Target Unit (For Blast Math)</label>
            <input type="number" id="target-models" value="10" min="1" />
          </div>
        </section>
      </div>

      <button id="calculate-btn">Run 10,000 Simulations</button>

      <section class="panel results-panel">
        <pre id="results-output">Awaiting calculation...</pre>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
