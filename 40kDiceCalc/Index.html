<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>40k Hurt System Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="calculator-container">
      <h1>40k Dice Calculator</h1>

      <div class="stats-grid">
        <section class="panel attacker-panel">
          <h2>Attacker Stats</h2>

          <label for="unitCount">Number of Units:</label>
          <input type="number" id="unitCount" value="1" min="1" />

          <label for="modelCount">Models :</label>
          <input type="number" id="modelCount" value="5" min="1" />

          <label for="attacks">Attacks (A):</label>
          <input type="number" id="attacks" value="4" min="1" />

          <label for="bs-ws">BS/WS:</label>
          <input type="number" id="bs-ws" value="3" min="2" max="6" />

          <label for="strength">Strength (S):</label>
          <input type="number" id="strength" value="4" min="1" />

          <label for="ap">AP:</label>
          <input type="number" id="ap" value="-1" max="0" />

          <label for="damage">Damage (D):</label>
          <input type="number" id="damage" value="1" min="1" />
        </section>

        <section class="panel target-panel">
          <h2>Target Unit Stats</h2>

          <label for="toughness">Toughness (T):</label>
          <input type="number" id="toughness" value="10" min="1" />

          <label for="wounds">Wounds (W):</label>
          <input type="number" id="wounds" value="12" min="1" />

          <label for="save">SV:</label>
          <input type="number" id="save" value="4" min="2" max="6" />

          <label for="inVul">inVul Save:</label>
          <input type="number" id="inVul" min="2" max="6" />
        </section>
      </div>

      <button id="calculate-btn">Calculate Hurt System</button>

      <section class="panel results-panel">
        <h2>Simulation Results</h2>
        <div id="output-log">
          <p>Waiting for input...</p>
        </div>
        <div
          id="results-section"
          style="margin-top: 20px; padding: 10px; border: 1px solid #ccc"
        >
          <h3>Simulation Results:</h3>
          <pre id="results-output">Awaiting calculation...</pre>
        </div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
