<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>40k Dice Calculator | Structural Multi-Pattern</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Cinzel:wght@400;700&family=Creepster&family=Exo+2:wght@400;700&family=Montserrat:wght@400;700&family=Nosifer&family=Orbitron:wght@400;700&family=Rajdhani:wght@400;700&family=Uncial+Antiqua&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
  </head>
  <body>
    <main class="calculator-container">
      <h1 class="main-title-header">Hurt System Cogitator</h1>

      <div class="stats-grid">
        <section class="panel attacker-panel">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 15px;
              flex-wrap: wrap;
              gap: 10px;
            "
          >
            <h2 class="section-heading-label">Attacker Roster</h2>

            <select
              id="theme-dropdown"
              style="padding: 8px; font-weight: bold; cursor: pointer"
            >
              <option value="space_wolves">Space Wolves</option>
              <option value="necrons">Necrons</option>
              <option value="tyranids">Tyranids</option>
              <option value="votann">Leagues of Votann</option>
            </select>

            <button
              id="clear-dashboard-btn"
              style="
                border-radius: 4px;
                padding: 8px 15px;
                cursor: pointer;
                font-weight: bold;
                transition: 0.2s;
              "
            >
              ⚠️ Clear Dashboard
            </button>

            <div style="display: flex; gap: 10px; align-items: center">
              <input
                type="text"
                id="roster-name"
                value="SpaceWolves_Roster"
                placeholder="Name your roster..."
                style="width: 220px; height: 42px; padding: 5px 10px"
              />
              <input
                type="file"
                id="import-file-input"
                accept=".json"
                style="display: none"
              />
              <button
                id="import-roster-btn"
                class="btn-primary"
                style="height: 42px"
              >
                Import JSON
              </button>
              <button
                id="export-roster-btn"
                class="btn-primary"
                style="height: 42px"
              >
                Export JSON
              </button>
              <button
                id="add-attacker-btn"
                class="btn-primary"
                style="height: 42px"
              >
                + Deploy Unit
              </button>
            </div>
          </div>

          <div
            class="global-rules-panel"
            style="padding: 15px; border-radius: 6px; margin-bottom: 15px"
          >
            <div style="display: flex; gap: 10px; align-items: center">
              <label class="section-heading-label" style="font-weight: bold"
                >Army Wide Rules:</label
              >
              <select id="global-mod-dropdown" style="flex-grow: 1">
                <option value="none">
                  -- Select Rule to Apply to ALL Units --
                </option>
                <option value="lethal">Lethal Hits</option>
                <option value="devastating">Devastating Wounds</option>
                <option value="sustained">Sustained Hits</option>
                <option value="hit_plus_1">+1 to Hit</option>
                <option value="wound_plus_1">+1 to Wound</option>
                <option value="reroll_hits_1">Reroll 1s to Hit</option>
                <option value="reroll_hits_all">Reroll All (Hit)</option>
                <option value="reroll_wounds_1">Reroll 1s to Wound</option>
                <option value="reroll_wounds_all">Reroll All (Wound)</option>
              </select>
              <button id="add-global-mod-btn" class="btn-primary">
                Apply to All
              </button>
            </div>
          </div>
          <div id="attacker-roster"></div>
        </section>

        <section class="panel target-panel">
          <h2 class="section-heading-label">Target Profile</h2>

          <h4 class="section-heading-label">Defensive Stats</h4>
          <div class="core-stats-row">
            <div class="input-field">
              <label>Toughness (T)</label
              ><input type="number" id="toughness" value="10" min="1" />
            </div>
            <div class="input-field">
              <label>Wounds (W)</label
              ><input type="number" id="wounds" value="12" min="1" />
            </div>
            <div class="input-field">
              <label>Save (SV)</label
              ><input type="number" id="save" value="4" min="2" max="7" />
            </div>
            <div class="input-field">
              <label>Invulnerable</label
              ><input
                type="number"
                id="inVul"
                min="2"
                max="6"
                placeholder="None"
              />
            </div>
          </div>

          <h4 class="section-heading-label">Defensive Modifiers</h4>
          <div style="display: flex; flex-direction: column; gap: 8px">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                text-transform: none;
              "
              ><input type="checkbox" id="def-minus-hit" style="width: 16px" />
              -1 to Hit</label
            >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                text-transform: none;
              "
              ><input
                type="checkbox"
                id="def-minus-wound"
                style="width: 16px"
              />
              -1 to Wound</label
            >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                text-transform: none;
              "
              ><input
                type="checkbox"
                id="def-minus-wound-str"
                style="width: 16px"
              />
              -1 Wound (if S &gt; T)</label
            >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                text-transform: none;
              "
              ><input type="checkbox" id="def-cover" style="width: 16px" />
              Benefit of Cover</label
            >
          </div>

          <h4 class="section-heading-label">Damage Mitigation</h4>
          <div class="core-stats-row">
            <div class="input-field">
              <label>Reduce Damage</label>
              <select id="def-reduce-dam">
                <option value="none">None</option>
                <option value="half">Half Damage</option>
                <option value="minus1">-1 Damage</option>
              </select>
            </div>
            <div class="input-field">
              <label>Feel No Pain</label>
              <select id="def-fnp">
                <option value="0">None</option>
                <option value="6">6+</option>
                <option value="5">5+</option>
                <option value="4">4+</option>
              </select>
            </div>
          </div>

          <div class="input-field" style="margin-top: 15px">
            <label>Models in Target Unit (Blast)</label>
            <input type="number" id="target-models" value="10" min="1" />
          </div>
        </section>
      </div>

      <div style="display: flex; gap: 15px; margin-bottom: 20px">
        <button id="calculate-btn" style="flex: 1; height: 54px"></button>
        <button
          id="advanced-analytics-btn"
          style="flex: 1; height: 54px"
        ></button>
      </div>

      <section class="panel results-panel-wrapper" id="results-wrapper">
        <div class="stat-cards-grid" id="stats-html"></div>
        <div style="display: flex; flex-direction: column; width: 100%">
          <div
            style="
              position: relative;
              height: 100%;
              min-height: 350px;
              width: 100%;
            "
          >
            <canvas id="damageChart"></canvas>
          </div>
        </div>
      </section>

      <section
        class="panel"
        id="advanced-analytics-wrapper"
        style="display: none; margin-top: 20px"
      >
        <h2 class="section-heading-label">Advanced Tactical Reports</h2>
        <div id="advanced-reports-container"></div>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
