<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>40k Dice Calculator | Space Wolves Pattern</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
  </head>
  <body>
    <main class="calculator-container">
      <h1>Hurt System Cogitator</h1>

      <div class="stats-grid">
        <section class="panel attacker-panel">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 15px;
              flex-wrap: wrap;
              gap: 10px;
            "
          >
            <h2>Attacker Roster</h2>
            <div style="display: flex; gap: 10px; align-items: center">
              <input
                type="text"
                id="roster-name"
                value="SpaceWolves_Roster"
                placeholder="Name your roster..."
                style="width: 220px; height: 42px; padding: 5px 10px"
              />

              <input
                type="file"
                id="import-file-input"
                accept=".json"
                style="display: none"
              />
              <button
                id="import-roster-btn"
                class="btn-primary"
                style="height: 42px; background-color: var(--sw-mid-blue)"
              >
                Import JSON
              </button>

              <button
                id="export-roster-btn"
                class="btn-primary"
                style="height: 42px"
              >
                Export JSON
              </button>
              <button
                id="add-attacker-btn"
                class="btn-primary"
                style="height: 42px"
              >
                + Deploy Unit
              </button>
            </div>
          </div>
          <div
            class="global-rules-panel"
            style="
              background: rgba(196, 130, 53, 0.1);
              padding: 15px;
              border-radius: 6px;
              margin-bottom: 15px;
              border: 1px dashed var(--accent-bronze);
            "
          >
            <div style="display: flex; gap: 10px; align-items: center">
              <label style="font-weight: bold; color: var(--accent-bronze)"
                >Army Wide Rules:</label
              >
              <select id="global-mod-dropdown" style="flex-grow: 1">
                <option value="none">
                  -- Select Rule to Apply to ALL Units --
                </option>
                <option value="lethal">Lethal Hits</option>
                <option value="devastating">Devastating Wounds</option>
                <option value="sustained">Sustained Hits</option>
                <option value="hit_plus_1">+1 to Hit</option>
                <option value="wound_plus_1">+1 to Wound</option>
                <option value="reroll_hits_1">Reroll 1s to Hit</option>
                <option value="reroll_hits_all">Reroll All (Hit)</option>
                <option value="reroll_wounds_1">Reroll 1s to Wound</option>
                <option value="reroll_wounds_all">Reroll All (Wound)</option>
              </select>
              <button
                id="add-global-mod-btn"
                class="btn-primary"
                style="background-color: var(--accent-bronze); color: #0f1115"
              >
                Apply to All
              </button>
            </div>
          </div>
          <div id="attacker-roster"></div>
        </section>

        <section class="panel target-panel">
          <h2>Target Profile</h2>

          <h4>Defensive Stats</h4>
          <div class="core-stats-row">
            <div class="input-field">
              <label>Toughness (T)</label
              ><input type="number" id="toughness" value="10" min="1" />
            </div>
            <div class="input-field">
              <label>Wounds (W)</label
              ><input type="number" id="wounds" value="12" min="1" />
            </div>
            <div class="input-field">
              <label>Save (SV)</label
              ><input type="number" id="save" value="4" min="2" max="7" />
            </div>
            <div class="input-field">
              <label>Invulnerable</label
              ><input
                type="number"
                id="inVul"
                min="2"
                max="6"
                placeholder="None"
              />
            </div>
          </div>

          <h4>Defensive Modifiers</h4>
          <div style="display: flex; flex-direction: column; gap: 8px">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                color: var(--text-primary);
                text-transform: none;
              "
              ><input type="checkbox" id="def-minus-hit" style="width: 16px" />
              -1 to Hit</label
            >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                color: var(--text-primary);
                text-transform: none;
              "
              ><input
                type="checkbox"
                id="def-minus-wound"
                style="width: 16px"
              />
              -1 to Wound</label
            >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                color: var(--text-primary);
                text-transform: none;
              "
              ><input
                type="checkbox"
                id="def-minus-wound-str"
                style="width: 16px"
              />
              -1 Wound (if S > T)</label
            >
            <label
              style="
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                color: var(--text-primary);
                text-transform: none;
              "
              ><input type="checkbox" id="def-cover" style="width: 16px" />
              Benefit of Cover</label
            >
          </div>

          <h4>Damage Mitigation</h4>
          <div class="core-stats-row">
            <div class="input-field">
              <label>Reduce Damage</label>
              <select id="def-reduce-dam">
                <option value="none">None</option>
                <option value="half">Half Damage</option>
                <option value="minus1">-1 Damage</option>
              </select>
            </div>
            <div class="input-field">
              <label>Feel No Pain</label>
              <select id="def-fnp">
                <option value="0">None</option>
                <option value="6">6+</option>
                <option value="5">5+</option>
                <option value="4">4+</option>
              </select>
            </div>
          </div>

          <div class="input-field" style="margin-top: 15px">
            <label>Models in Target Unit (For Blast Math)</label>
            <input type="number" id="target-models" value="10" min="1" />
          </div>
        </section>
      </div>

      <div style="display: flex; gap: 15px; margin-bottom: 20px">
        <button id="calculate-btn" style="flex: 1">
          FOR THE EMPEROR! (Standard)
        </button>
        <button
          id="advanced-analytics-btn"
          style="
            flex: 1;
            background-color: var(--accent-bronze);
            color: #0f1115;
          "
        >
          Run Advanced Analytics
        </button>
      </div>

      <section class="panel results-panel-wrapper" id="results-wrapper">
        <div class="stat-cards-grid" id="stats-html"></div>

        <div style="display: flex; flex-direction: column; width: 100%">
          <div
            style="
              display: flex;
              justify-content: flex-end;
              align-items: center;
              margin-bottom: 10px;
            "
          ></div>
          <div
            style="
              position: relative;
              height: 100%;
              min-height: 350px;
              width: 100%;
            "
          >
            <canvas id="damageChart"></canvas>
          </div>
        </div>
      </section>
      <section
        class="panel"
        id="advanced-analytics-wrapper"
        style="display: none; margin-top: 20px"
      >
        <h2>Advanced Tactical Reports</h2>
        <div id="advanced-reports-container"></div>
      </section>
    </main>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
