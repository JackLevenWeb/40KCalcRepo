<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>40k Hurt System Calculator</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <main class="calculator-container">
        <h1>40k Dice Calculator</h1>

        <div class="stats-grid">
            <section class="panel attacker-panel">
                <h2>Attacker Weapon Stats</h2>
                
                <label for="attacks">Attacks (A):</label>
                <input type="number" id="attacks" value="5" min="1">

                <label for="bs-ws">BS/WS:</label>
                <input type="number" id="bs-ws" value="3" min="2" max="6">

                <label for="strength">Strength (S):</label>
                <input type="number" id="strength" value="4" min="1">

                <label for="ap">AP:</label>
                <input type="number" id="ap" value="0" max="0">

                <label for="damage">Damage (D):</label>
                <input type="number" id="damage" value="1" min="1">
            </section>

            <section class="panel target-panel">
                <h2>Target Unit Stats</h2>
                
                <label for="toughness">Toughness (T):</label>
                <input type="number" id="toughness" value="4" min="1">

                <label for="wounds">Wounds (W):</label>
                <input type="number" id="wounds" value="10" min="1">

                <label for="save">SV:</label>
                <input type="number" id="save" value="4" min="2" max="6">

                <label for="invuln">Invuln Save:</label>
                <input type="number" id="invuln" min="2" max="6">
            </section>
        </div>

        <button id="calculate-btn">Calculate Hurt System</button>

        <section class="panel results-panel">
            <h2>Simulation Results</h2>
            <div id="output-log">
                <p>Waiting for input...</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
